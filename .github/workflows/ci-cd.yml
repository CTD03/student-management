name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Export JAVA_HOME manually
      run: |
        echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV
        export PATH=$JAVA_HOME/bin:$PATH

    - name: Grant execute permission to mvnw
      run: chmod +x mvnw

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Checkstyle Scan
      run: ./mvnw checkstyle:checkstyle

    - name: OWASP Dependency Check (via Maven)
      run: ./mvnw org.owasp:dependency-check-maven:check

    - name: Build Docker Image
      run: docker build -t student-management .

    - name: Scan Docker Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: student-management
        format: table

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-d2av8p8gjchc73eogrqg/deploys \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
