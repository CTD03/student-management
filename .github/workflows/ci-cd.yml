name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  STAGING_URL: https://your-staging-url.example.com
  PROD_URL: https://your-prod-url.example.com

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x mvnw
      - run: ./mvnw -B clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  sca:
    name: SCA (Dependency Check)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x mvnw
      - run: ./mvnw org.owasp:dependency-check-maven:check -Dformat=ALL
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  sast:
    name: SAST (SonarCloud)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x mvnw
      - env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=CTD03_student-management \
            -Dsonar.organization=ctd03 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${SONAR_TOKEN}

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t student-management:latest .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: student-management:latest
          format: table
          severity: CRITICAL,HIGH

 dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      issues: write
    steps:
      - name: Run OWASP ZAP Baseline Scan (no auto artifact)
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: https://student-management-p6z0.onrender.com
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          rules_file_name: ''
          cmd_options: '-a'
          artifact_name: '' 
  
      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: zapreport # 
          path: report_html.html
  
      - name: Upload ZAP JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: zapreport-json
          path: report_json.json
  
      - name: Upload ZAP Markdown Report
        uses: actions/upload-artifact@v4
        with:
          name: zapreport-md
          path: report_md.md
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [sca, sast, container-scan, dast]
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json"

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          payload="{\"content\": \"🚀 Pipeline finished with status: ${STATUS} for **${{ github.repository }}** on branch \`${GITHUB_REF_NAME}\`\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\nSonar: https://sonarcloud.io/dashboard?id=CTD03_student-management\"}"
          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
