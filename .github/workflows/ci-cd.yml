dast:
  name: DAST (OWASP ZAP)
  runs-on: ubuntu-latest
  needs: build
  permissions:
    contents: write
    issues: write
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run OWASP ZAP Baseline Scan (no default artifact)
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: https://student-management-p6z0.onrender.com
        docker_name: ghcr.io/zaproxy/zaproxy:stable
        rules_file_name: ''
        cmd_options: '-a'
        artifact_name: '' # tắt upload mặc định

    - name: List generated reports
      run: ls -l

    - name: Upload ZAP HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: zapreport-html
        path: report_html.html

    - name: Upload ZAP JSON Report
      uses: actions/upload-artifact@v4
      with:
        name: zapreport-json
        path: report_json.json
